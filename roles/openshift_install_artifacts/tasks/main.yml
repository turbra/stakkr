---
- name: Derive install artifact context
  ansible.builtin.set_fact:
    openshift_install_artifacts_render_dir: "{{ openshift_install_artifacts.output_dir }}"

- name: Validate pull secret exists on the control node
  ansible.builtin.stat:
    path: "{{ openshift_install_artifacts.pull_secret_file }}"
  register: stakkr_openshift_install_artifacts_pull_secret_stat

- name: Validate SSH public key exists on the control node
  ansible.builtin.stat:
    path: "{{ openshift_install_artifacts.ssh_public_key_file }}"
  register: stakkr_openshift_install_artifacts_ssh_pubkey_stat

- name: Validate additional trust bundle path when configured
  ansible.builtin.stat:
    path: "{{ openshift_install_artifacts.additional_trust_bundle_file }}"
  register: stakkr_openshift_install_artifacts_trust_bundle_stat
  when: openshift_install_artifacts.additional_trust_bundle_file | length > 0

- name: Assert required local files are available
  ansible.builtin.assert:
    that:
      - stakkr_openshift_install_artifacts_pull_secret_stat.stat.exists
      - stakkr_openshift_install_artifacts_ssh_pubkey_stat.stat.exists
      - >-
        (
          openshift_install_artifacts.additional_trust_bundle_file | length == 0
        ) or stakkr_openshift_install_artifacts_trust_bundle_stat.stat.exists
    fail_msg: >-
      Required local input files are missing. Expected a pull secret, SSH
      public key, and any optional trust bundle on the control node.

- name: Validate node counts between install matrix and VM matrix
  ansible.builtin.assert:
    that:
      - openshift_install_cluster.nodes | length == openshift_cluster_nodes | length
    fail_msg: >-
      openshift_install_cluster.nodes and openshift_cluster_nodes must define
      the same number of hosts.

- name: Validate node names align between install matrix and VM matrix
  ansible.builtin.assert:
    that:
      - >-
        (
          openshift_install_cluster.nodes | map(attribute='name') | list | sort
        ) == (
          openshift_cluster_nodes | map(attribute='name') | list | sort
        )
    fail_msg: >-
      Node names in openshift_install_cluster.yml and
      openshift_cluster_vm.yml do not match.

- name: Validate node MACs align between install matrix and VM matrix
  ansible.builtin.assert:
    that:
      - >-
        (
          openshift_install_cluster.nodes | map(attribute='mac_address') | list | sort
        ) == (
          openshift_cluster_nodes | map(attribute='mac_address') | list | sort
        )
    fail_msg: >-
      Node MAC addresses in openshift_install_cluster.yml and
      openshift_cluster_vm.yml do not match.

- name: Validate every VM node defines a root disk serial
  ansible.builtin.assert:
    that:
      - >-
        (
          openshift_cluster_nodes
          | map(attribute='disks.root.serial')
          | reject('equalto', '')
          | list
          | length
        ) == (openshift_cluster_nodes | length)
    fail_msg: >-
      Every openshift_cluster_node root disk must define a non-empty serial so
      agent-config.yaml can render deterministic rootDeviceHints.

- name: Validate root disk serials are unique
  ansible.builtin.assert:
    that:
      - >-
        (
          openshift_cluster_nodes
          | map(attribute='disks.root.serial')
          | list
          | unique
          | length
        ) == (openshift_cluster_nodes | length)
    fail_msg: >-
      openshift_cluster_vm.yml root disk serials must be unique across all
      OpenShift nodes.

- name: Read pull secret from the control node
  ansible.builtin.slurp:
    src: "{{ openshift_install_artifacts.pull_secret_file }}"
  register: stakkr_openshift_install_artifacts_pull_secret_raw

- name: Read SSH public key from the control node
  ansible.builtin.slurp:
    src: "{{ openshift_install_artifacts.ssh_public_key_file }}"
  register: stakkr_openshift_install_artifacts_ssh_public_key_raw

- name: Read additional trust bundle when configured
  ansible.builtin.slurp:
    src: "{{ openshift_install_artifacts.additional_trust_bundle_file }}"
  register: stakkr_openshift_install_artifacts_trust_bundle_raw
  when: openshift_install_artifacts.additional_trust_bundle_file | length > 0

- name: Recreate render directory when requested
  ansible.builtin.file:
    path: "{{ openshift_install_artifacts_render_dir }}"
    state: absent
  when: openshift_install_artifacts.reset_render_dir | bool

- name: Create render directory
  ansible.builtin.file:
    path: "{{ openshift_install_artifacts_render_dir }}"
    state: directory
    mode: "0755"

- name: Render install-config.yaml
  ansible.builtin.template:
    src: install-config.yaml.j2
    dest: "{{ openshift_install_artifacts_render_dir }}/install-config.yaml"
    mode: "0644"

- name: Render agent-config.yaml
  ansible.builtin.template:
    src: agent-config.yaml.j2
    dest: "{{ openshift_install_artifacts_render_dir }}/agent-config.yaml"
    mode: "0644"

