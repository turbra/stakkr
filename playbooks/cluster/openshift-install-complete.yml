---
- name: Wait for local OpenShift agent-based installation to complete
  hosts: localhost
  connection: local
  become: true
  gather_facts: false
  vars_files:
    - ../../vars/global/execution_environment.yml
    - ../../vars/cluster/openshift_installer_binaries.yml
    - ../../vars/cluster/openshift_install_cluster.yml
    - ../../vars/cluster/openshift_install_artifacts.yml
  tasks:
    - name: Validate the rendered install directory exists
      ansible.builtin.stat:
        path: "{{ openshift_install_artifacts.output_dir }}"
      register: openshift_install_complete_dir_stat

    - name: Validate the installer binary exists
      ansible.builtin.stat:
        path: "{{ openshift_installer_binaries.install_dir }}/openshift-install"
      register: openshift_install_complete_binary_stat

    - name: Assert the installer wait prerequisites are present
      ansible.builtin.assert:
        that:
          - openshift_install_complete_dir_stat.stat.exists
          - openshift_install_complete_binary_stat.stat.exists
        fail_msg: >-
          Expected the rendered install directory at
          {{ openshift_install_artifacts.output_dir }} and installer binary at
          {{ openshift_installer_binaries.install_dir }}/openshift-install
          before waiting for install completion.

    - name: Wait for install completion
      ansible.builtin.command:
        argv:
          - "{{ openshift_installer_binaries.install_dir }}/openshift-install"
          - "--dir={{ openshift_install_artifacts.output_dir }}"
          - wait-for
          - install-complete
          - --log-level=debug
      changed_when: false
