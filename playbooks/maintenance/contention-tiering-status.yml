---
- name: Report current live contention tiering state for managed VM scopes
  hosts: hypervisors
  become: true
  gather_facts: false
  vars_files:
    - ../../vars/global/host_resource_management.yml
    - ../../vars/global/host_memory_oversubscription.yml
    - ../../vars/global/cgroup_tiering.yml
  tasks:
    - name: Validate that contention tiering is populated
      ansible.builtin.assert:
        that:
          - contention_tiering.tier_weights | length > 0
          - contention_tiering.vm_tiers | length > 0

    - name: Query current systemd scope units
      ansible.builtin.command:
        argv:
          - systemctl
          - list-units
          - --type=scope
          - --all
          - --no-pager
      register: contention_tiering_scope_units
      changed_when: false

    - name: Resolve live VM scope names from current systemd output
      ansible.builtin.set_fact:
        contention_tiering_scope_names: >-
          {{
            contention_tiering_scope_names | default({}) | combine(
              {
                vm_name: (
                  (
                    contention_tiering_scope_units.stdout_lines
                    | select('search', vm_name)
                    | list
                    | first
                    | default('')
                  ).split() | first | default('<unresolved>')
                )
              }
            )
          }}
      loop: "{{ contention_tiering.managed_vm_names }}"
      loop_control:
        loop_var: vm_name
        label: "{{ vm_name }}"

    - name: Read current AllowedCPUs and CPUWeight for resolved scopes
      ansible.builtin.command:
        argv:
          - systemctl
          - show
          - "{{ contention_tiering_scope_names[vm_name] }}"
          - -p
          - AllowedCPUs
          - -p
          - CPUWeight
      register: contention_tiering_scope_properties
      changed_when: false
      failed_when: false
      loop: "{{ contention_tiering.managed_vm_names }}"
      loop_control:
        loop_var: vm_name
        label: "{{ vm_name }}"
      when: contention_tiering_scope_names.get(vm_name, '') != '<unresolved>'

    - name: Show current contention tiering state
      ansible.builtin.debug:
        msg:
          - "VM: {{ item.vm_name | default(item.item) }}"
          - "Tier: {{ contention_tiering.vm_tiers.get(item.vm_name | default(item.item), '<unknown>') }}"
          - "Target CPUWeight: {{ contention_tiering.tier_weights.get(contention_tiering.vm_tiers.get(item.vm_name | default(item.item), ''), '<unknown>') }}"
          - "{{ item.stdout_lines | default(['<unavailable>']) | join(' | ') }}"
      loop: "{{ contention_tiering_scope_properties.results | default([]) }}"
      loop_control:
        label: "{{ item.vm_name | default(item.item | default('<unknown>')) }}"
