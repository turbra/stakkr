---
- name: Apply first-pass clock frequency tiering to managed KVM workers
  hosts: hypervisors
  become: true
  gather_facts: false
  vars_files:
    - ../../vars/global/host_resource_management.yml
    - ../../vars/global/host_memory_oversubscription.yml
    - ../../vars/global/cgroup_tiering.yml
  vars:
    clock_frequency_tiering_policies: >-
      {{ clock_frequency_tiering.vm_policies | default({}) }}
  tasks:
    - name: Validate that clock frequency tiering is enabled and populated
      ansible.builtin.assert:
        that:
          - clock_frequency_tiering.enabled | bool
          - clock_frequency_tiering.cpufreq_interface | length > 0
          - clock_frequency_tiering_policies | length > 0

    - name: Gather current vCPU count for each managed VM
      ansible.builtin.shell: |
        set -euo pipefail
        virsh dominfo "{{ item.value.domain | default(item.key) }}" |
          awk -F': +' '/^CPU\(s\):/ { print $2 }'
      args:
        executable: /bin/bash
      loop: "{{ clock_frequency_tiering_policies | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      register: clock_frequency_tiering_vcpu_counts
      changed_when: false

    - name: Query current systemd scope units
      ansible.builtin.command:
        argv:
          - systemctl
          - list-units
          - --type=scope
          - --all
          - --no-pager
      register: clock_frequency_tiering_scope_units
      changed_when: false

    - name: Resolve live VM scope names from current systemd output
      ansible.builtin.set_fact:
        clock_frequency_tiering_scope_names: >-
          {{
            clock_frequency_tiering_scope_names | default({}) | combine(
              {
                vm_name: (
                  (
                    clock_frequency_tiering_scope_units.stdout_lines
                    | select('search', vm_name)
                    | list
                    | first
                    | default('')
                  ).split() | first | default('<unresolved>')
                )
              }
            )
          }}
      loop: "{{ clock_frequency_tiering.managed_vm_names }}"
      loop_control:
        loop_var: vm_name
        label: "{{ vm_name }}"

    - name: Fail if any VM scope could not be resolved safely
      ansible.builtin.assert:
        that:
          - clock_frequency_tiering_scope_names.get(vm_name, '') | length > 0
          - clock_frequency_tiering_scope_names.get(vm_name, '') is search('^machine-qemu')
        fail_msg: >-
          Unable to resolve a valid machine-qemu scope for {{ vm_name }}.
      loop: "{{ clock_frequency_tiering.managed_vm_names }}"
      loop_control:
        loop_var: vm_name
        label: "{{ vm_name }}"

    - name: Widen each managed VM scope AllowedCPUs before virsh pinning
      ansible.builtin.command:
        argv:
          - systemctl
          - set-property
          - "{{ clock_frequency_tiering_scope_names[item] }}"
          - "AllowedCPUs={{ cgroup_tiering.host_all_cpus }}"
      loop: "{{ clock_frequency_tiering.managed_vm_names }}"
      loop_control:
        label: "{{ item }}"
      changed_when: true

    - name: Assert that each managed VM returned a vCPU count
      ansible.builtin.assert:
        that:
          - (item.stdout | trim | length) > 0
      loop: "{{ clock_frequency_tiering_vcpu_counts.results }}"
      loop_control:
        label: "{{ item.item.key }}"

    - name: Apply persistent live vCPU pinning for each managed VM
      ansible.builtin.shell: |
        set -euo pipefail
        for ((vcpu=0; vcpu<{{ item.stdout | trim | int }}; vcpu++)); do
          virsh vcpupin \
            "{{ item.item.value.domain | default(item.item.key) }}" \
            "${vcpu}" \
            "{{ item.item.value.vcpu_cpuset }}" \
            --live \
            --config
        done
      args:
        executable: /bin/bash
      loop: "{{ clock_frequency_tiering_vcpu_counts.results }}"
      loop_control:
        label: "{{ item.item.key }}"
      changed_when: true

    - name: Apply persistent live emulator pinning for each managed VM
      ansible.builtin.command:
        argv:
          - virsh
          - emulatorpin
          - "{{ item.value.domain | default(item.key) }}"
          - "{{ item.value.emulator_cpuset }}"
          - --live
          - --config
      loop: "{{ clock_frequency_tiering_policies | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      changed_when: true

    - name: Apply per-CPU frequency caps for each managed VM cpuset
      ansible.builtin.shell: |
        set -euo pipefail

        expand_cpuset() {
          local token start end cpu
          IFS=',' read -ra tokens <<< "$1"
          for token in "${tokens[@]}"; do
            if [[ "$token" == *-* ]]; then
              start="${token%-*}"
              end="${token#*-}"
              for ((cpu=start; cpu<=end; cpu++)); do
                printf '%s\n' "$cpu"
              done
            else
              printf '%s\n' "$token"
            fi
          done
        }

        while read -r cpu; do
          path="/sys/devices/system/cpu/cpu${cpu}/cpufreq/{{ clock_frequency_tiering.cpufreq_interface }}"
          if [[ ! -f "$path" ]]; then
            echo "missing cpufreq control for cpu${cpu}: $path" >&2
            exit 1
          fi
          printf '%s\n' "{{ item.value.scaling_max_freq_khz }}" >"$path"
        done < <(expand_cpuset "{{ item.value.vcpu_cpuset }}")
      args:
        executable: /bin/bash
      loop: "{{ clock_frequency_tiering_policies | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      changed_when: true

    - name: Show applied clock frequency policy
      ansible.builtin.debug:
        msg:
          - "VM: {{ item.key }}"
          - "Domain: {{ item.value.domain | default(item.key) }}"
          - "vCPU cpuset: {{ item.value.vcpu_cpuset }}"
          - "emulator cpuset: {{ item.value.emulator_cpuset }}"
          - "max frequency: {{ item.value.scaling_max_freq_khz }} kHz"
      loop: "{{ clock_frequency_tiering_policies | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
