---
- name: Report current host foundation resource and memory policy
  hosts: hypervisors
  become: true
  gather_facts: false
  vars_files:
    - ../../vars/global/host_resource_management.yml
    - ../../vars/global/host_memory_oversubscription.yml
  tasks:
    - name: Read the current systemd manager host resource policy file
      ansible.builtin.command:
        argv:
          - cat
          - /etc/systemd/system.conf.d/90-stakkr-host-resource-management.conf
      register: stakkr_host_config_manager_conf
      changed_when: false
      failed_when: false

    - name: Read the current performance-domain slice definitions
      ansible.builtin.command:
        argv:
          - cat
          - "/etc/systemd/system/{{ item }}"
      loop:
        - machine-gold.slice
        - machine-silver.slice
        - machine-bronze.slice
      loop_control:
        label: "{{ item }}"
      register: stakkr_host_config_slices
      changed_when: false
      failed_when: false

    - name: Read the irqbalance banned CPU list
      ansible.builtin.command:
        argv:
          - bash
          - -lc
          - "grep '^IRQBALANCE_BANNED_CPULIST=' /etc/sysconfig/irqbalance"
      register: stakkr_host_config_irqbalance
      changed_when: false
      failed_when: false

    - name: Check the host memory oversubscription service enabled state
      ansible.builtin.command:
        argv:
          - systemctl
          - is-enabled
          - stakkr-host-memory-oversubscription.service
      register: stakkr_host_config_memory_enabled
      changed_when: false
      failed_when: false

    - name: Check the host memory oversubscription service active state
      ansible.builtin.command:
        argv:
          - systemctl
          - is-active
          - stakkr-host-memory-oversubscription.service
      register: stakkr_host_config_memory_active
      changed_when: false
      failed_when: false

    - name: Check whether the zram device is active
      ansible.builtin.shell: |
        set -euo pipefail
        swapon --show=NAME --noheadings | awk '$1=="/dev/{{ host_memory_oversubscription.zram.device_name }}"{found=1} END{exit(found?0:1)}'
      args:
        executable: /bin/bash
      register: stakkr_host_config_zram_active
      changed_when: false
      failed_when: false
      when: host_memory_oversubscription.zram.enabled | bool

    - name: Read the current THP enabled mode
      ansible.builtin.command:
        argv:
          - cat
          - /sys/kernel/mm/transparent_hugepage/enabled
      register: stakkr_host_config_thp_enabled
      changed_when: false
      failed_when: false
      when: host_memory_oversubscription.transparent_hugepages.enabled | bool

    - name: Read the current THP defrag mode
      ansible.builtin.command:
        argv:
          - cat
          - /sys/kernel/mm/transparent_hugepage/defrag
      register: stakkr_host_config_thp_defrag
      changed_when: false
      failed_when: false
      when: host_memory_oversubscription.transparent_hugepages.enabled | bool

    - name: Read the current KSM run state
      ansible.builtin.command:
        argv:
          - cat
          - /sys/kernel/mm/ksm/run
      register: stakkr_host_config_ksm_run
      changed_when: false
      failed_when: false
      when: host_memory_oversubscription.ksm.enabled | bool

    - name: Read the current KSM pages-to-scan value
      ansible.builtin.command:
        argv:
          - cat
          - /sys/kernel/mm/ksm/pages_to_scan
      register: stakkr_host_config_ksm_pages_to_scan
      changed_when: false
      failed_when: false
      when: host_memory_oversubscription.ksm.enabled | bool

    - name: Read the current KSM sleep interval
      ansible.builtin.command:
        argv:
          - cat
          - /sys/kernel/mm/ksm/sleep_millisecs
      register: stakkr_host_config_ksm_sleep_millisecs
      changed_when: false
      failed_when: false
      when: host_memory_oversubscription.ksm.enabled | bool

    - name: Show current host foundation summary
      ansible.builtin.debug:
        msg:
          - "Host reserved CPUs: {{ host_resource_management.cpu_pools.host_reserved }}"
          - "Host emulator CPUs: {{ host_resource_management.cpu_pools.host_emulator }}"
          - "Guest-domain CPUs: {{ host_resource_management.cpu_pools.guest_domain }}"
          - "Memory policy service enabled: {{ stakkr_host_config_memory_enabled.stdout | default('disabled') | trim }}"
          - "Memory policy service active: {{ stakkr_host_config_memory_active.stdout | default('inactive') | trim }}"
          - "zram active: {{ 'yes' if (stakkr_host_config_zram_active.rc | default(1)) == 0 else 'no' }}"
          - "THP enabled: {{ stakkr_host_config_thp_enabled.stdout | default('<unavailable>') | trim }}"
          - "THP defrag: {{ stakkr_host_config_thp_defrag.stdout | default('<unavailable>') | trim }}"
          - "KSM run: {{ stakkr_host_config_ksm_run.stdout | default('<unavailable>') | trim }}"
          - "KSM pages_to_scan: {{ stakkr_host_config_ksm_pages_to_scan.stdout | default('<unavailable>') | trim }}"
          - "KSM sleep_millisecs: {{ stakkr_host_config_ksm_sleep_millisecs.stdout | default('<unavailable>') | trim }}"

    - name: Show current systemd manager resource policy file
      ansible.builtin.debug:
        msg: "{{ stakkr_host_config_manager_conf.stdout_lines | default(['<missing>']) }}"

    - name: Show current performance-domain slices
      ansible.builtin.debug:
        msg: "{{ item.stdout_lines | default(['<missing>']) }}"
      loop: "{{ stakkr_host_config_slices.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Show current irqbalance policy
      ansible.builtin.debug:
        msg: "{{ stakkr_host_config_irqbalance.stdout | default('<not set>') }}"
