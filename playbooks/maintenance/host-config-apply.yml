---
- name: Apply host foundation resource and memory policy
  hosts: hypervisors
  become: true
  gather_facts: false
  vars_files:
    - ../../vars/global/host_resource_management.yml
    - ../../vars/global/host_memory_oversubscription.yml
  tasks:
    - name: Validate host resource management variables
      ansible.builtin.assert:
        that:
          - host_resource_management.enabled | bool
          - host_resource_management.host_policy.manage_systemd_cpu_affinity is boolean
          - host_resource_management.host_policy.manage_irqbalance_guest_ban is boolean
          - host_resource_management.cpu_pools.host_reserved | length > 0
          - host_resource_management.cpu_pools.host_emulator | length > 0
          - host_resource_management.cpu_pools.guest_domain | length > 0
          - host_resource_management.performance_domains.gold.partition | length > 0
          - host_resource_management.performance_domains.silver.partition | length > 0
          - host_resource_management.performance_domains.bronze.partition | length > 0

    - name: Validate host memory oversubscription variables
      ansible.builtin.assert:
        that:
          - host_memory_oversubscription.enabled is boolean
          - host_memory_oversubscription.verify_state is boolean
          - host_memory_oversubscription.zram.enabled is boolean
          - host_memory_oversubscription.transparent_hugepages.enabled is boolean
          - host_memory_oversubscription.ksm.enabled is boolean
          - host_memory_oversubscription.zram.device_name | length > 0
          - host_memory_oversubscription.zram.size | length > 0
          - host_memory_oversubscription.zram.swap_priority | int >= -1
          - host_memory_oversubscription.transparent_hugepages.mode in ['always', 'madvise', 'never']
          - host_memory_oversubscription.transparent_hugepages.defrag_mode in ['always', 'defer', 'defer+madvise', 'madvise', 'never']
          - (host_memory_oversubscription.ksm.run | int) in [0, 1]
          - (host_memory_oversubscription.ksm.pages_to_scan | int) > 0
          - (host_memory_oversubscription.ksm.sleep_millisecs | int) > 0
      when: host_memory_oversubscription.enabled | bool

    - name: Ensure host configuration directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop:
        - /etc/systemd/system
        - /etc/systemd/system.conf.d

    - name: Install the systemd manager CPU affinity policy
      ansible.builtin.template:
        src: ../../templates/host-resource-management/systemd-manager-host-resource-management.conf.j2
        dest: /etc/systemd/system.conf.d/90-stakkr-host-resource-management.conf
        owner: root
        group: root
        mode: "0644"
      register: stakkr_host_config_manager_conf

    - name: Install the Gold performance-domain slice
      ansible.builtin.template:
        src: ../../templates/host-resource-management/machine-tier.slice.j2
        dest: /etc/systemd/system/machine-gold.slice
        owner: root
        group: root
        mode: "0644"
      vars:
        host_resource_management_tier_name: gold
        host_resource_management_tier: "{{ host_resource_management.performance_domains.gold }}"
      register: stakkr_host_config_gold_slice

    - name: Install the Silver performance-domain slice
      ansible.builtin.template:
        src: ../../templates/host-resource-management/machine-tier.slice.j2
        dest: /etc/systemd/system/machine-silver.slice
        owner: root
        group: root
        mode: "0644"
      vars:
        host_resource_management_tier_name: silver
        host_resource_management_tier: "{{ host_resource_management.performance_domains.silver }}"
      register: stakkr_host_config_silver_slice

    - name: Install the Bronze performance-domain slice
      ansible.builtin.template:
        src: ../../templates/host-resource-management/machine-tier.slice.j2
        dest: /etc/systemd/system/machine-bronze.slice
        owner: root
        group: root
        mode: "0644"
      vars:
        host_resource_management_tier_name: bronze
        host_resource_management_tier: "{{ host_resource_management.performance_domains.bronze }}"
      register: stakkr_host_config_bronze_slice

    - name: Configure irqbalance to avoid the guest-domain CPUs
      ansible.builtin.lineinfile:
        path: /etc/sysconfig/irqbalance
        regexp: '^IRQBALANCE_BANNED_CPULIST='
        line: "IRQBALANCE_BANNED_CPULIST={{ host_resource_management.cpu_pools.guest_domain }}"
        create: true
        owner: root
        group: root
        mode: "0644"
      register: stakkr_host_config_irqbalance
      when: host_resource_management.host_policy.manage_irqbalance_guest_ban | bool

    - name: Remove the irqbalance guest-domain exclusion policy
      ansible.builtin.lineinfile:
        path: /etc/sysconfig/irqbalance
        regexp: '^IRQBALANCE_BANNED_CPULIST='
        state: absent
        create: false
      register: stakkr_host_config_irqbalance
      when: not (host_resource_management.host_policy.manage_irqbalance_guest_ban | bool)

    - name: Reload systemd after slice changes
      ansible.builtin.command:
        argv:
          - systemctl
          - daemon-reload
      when:
        - not ansible_check_mode
        - >-
          stakkr_host_config_gold_slice.changed or
          stakkr_host_config_silver_slice.changed or
          stakkr_host_config_bronze_slice.changed
      changed_when: true

    - name: Reexecute systemd to apply manager CPU affinity changes
      ansible.builtin.command:
        argv:
          - systemctl
          - daemon-reexec
      when:
        - not ansible_check_mode
        - stakkr_host_config_manager_conf.changed
      changed_when: true

    - name: Restart irqbalance when the CPU exclusion policy changed
      ansible.builtin.systemd:
        name: irqbalance.service
        state: restarted
        enabled: true
      when:
        - not ansible_check_mode
        - stakkr_host_config_irqbalance.changed
      failed_when: false

    - name: Check that zramctl is available on the host
      ansible.builtin.command:
        argv:
          - bash
          - -lc
          - command -v zramctl
      register: stakkr_host_config_zramctl
      changed_when: false
      failed_when: false
      when:
        - host_memory_oversubscription.enabled | bool
        - host_memory_oversubscription.zram.enabled | bool

    - name: Fail when zramctl is unavailable on the host
      ansible.builtin.assert:
        that:
          - stakkr_host_config_zramctl.rc == 0
        fail_msg: >-
          zramctl is not available on the host, so the explicit zram path
          cannot be applied.
      when:
        - host_memory_oversubscription.enabled | bool
        - host_memory_oversubscription.zram.enabled | bool

    - name: Install the host memory oversubscription policy unit
      ansible.builtin.template:
        src: ../../templates/host-resource-management/host-memory-oversubscription.service.j2
        dest: /etc/systemd/system/stakkr-host-memory-oversubscription.service
        owner: root
        group: root
        mode: "0644"
      register: stakkr_host_config_memory_unit
      when: host_memory_oversubscription.enabled | bool

    - name: Reload systemd after host memory policy changes
      ansible.builtin.command:
        argv:
          - systemctl
          - daemon-reload
      when:
        - host_memory_oversubscription.enabled | bool
        - not ansible_check_mode
        - stakkr_host_config_memory_unit.changed
      changed_when: true

    - name: Ensure the host memory oversubscription policy service is enabled and active
      ansible.builtin.systemd:
        name: stakkr-host-memory-oversubscription.service
        enabled: true
        state: started
      when:
        - host_memory_oversubscription.enabled | bool
        - not ansible_check_mode

