---
- name: Report current live clock frequency tiering state for managed KVM workers
  hosts: hypervisors
  become: true
  gather_facts: false
  vars_files:
    - ../../vars/global/host_resource_management.yml
    - ../../vars/global/host_memory_oversubscription.yml
    - ../../vars/global/cgroup_tiering.yml
  vars:
    clock_frequency_tiering_policies: >-
      {{ clock_frequency_tiering.vm_policies | default({}) }}
  tasks:
    - name: Validate that clock frequency tiering is populated
      ansible.builtin.assert:
        that:
          - clock_frequency_tiering.cpufreq_interface | length > 0
          - clock_frequency_tiering_policies | length > 0

    - name: Show current vCPU pinning for each managed VM
      ansible.builtin.command:
        argv:
          - virsh
          - vcpupin
          - "{{ item.value.domain | default(item.key) }}"
      loop: "{{ clock_frequency_tiering_policies | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      register: clock_frequency_tiering_vcpupin_status
      changed_when: false

    - name: Show current emulator pinning for each managed VM
      ansible.builtin.command:
        argv:
          - virsh
          - emulatorpin
          - "{{ item.value.domain | default(item.key) }}"
      loop: "{{ clock_frequency_tiering_policies | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      register: clock_frequency_tiering_emulatorpin_status
      changed_when: false

    - name: Show current per-CPU max frequency state for each managed VM cpuset
      ansible.builtin.shell: |
        set -euo pipefail

        expand_cpuset() {
          local token start end cpu
          IFS=',' read -ra tokens <<< "$1"
          for token in "${tokens[@]}"; do
            if [[ "$token" == *-* ]]; then
              start="${token%-*}"
              end="${token#*-}"
              for ((cpu=start; cpu<=end; cpu++)); do
                printf '%s\n' "$cpu"
              done
            else
              printf '%s\n' "$token"
            fi
          done
        }

        while read -r cpu; do
          printf 'cpu%s target=%s current=%s hardware_max=%s\n' \
            "$cpu" \
            "{{ item.value.scaling_max_freq_khz }}" \
            "$(<"/sys/devices/system/cpu/cpu${cpu}/cpufreq/{{ clock_frequency_tiering.cpufreq_interface }}")" \
            "$(<"/sys/devices/system/cpu/cpu${cpu}/cpufreq/cpuinfo_max_freq")"
        done < <(expand_cpuset "{{ item.value.vcpu_cpuset }}")
      args:
        executable: /bin/bash
      loop: "{{ clock_frequency_tiering_policies | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      register: clock_frequency_tiering_cpufreq_status
      changed_when: false

    - name: Show vCPU pinning status
      ansible.builtin.debug:
        msg: "{{ item.stdout_lines }}"
      loop: "{{ clock_frequency_tiering_vcpupin_status.results }}"

    - name: Show emulator pinning status
      ansible.builtin.debug:
        msg: "{{ item.stdout_lines }}"
      loop: "{{ clock_frequency_tiering_emulatorpin_status.results }}"

    - name: Show per-CPU max frequency status
      ansible.builtin.debug:
        msg: "{{ item.stdout_lines }}"
      loop: "{{ clock_frequency_tiering_cpufreq_status.results }}"
