---
- name: Report current live cgroup tiering state for managed VM scopes
  hosts: hypervisors
  become: true
  gather_facts: false
  vars_files:
    - ../../vars/global/host_resource_management.yml
    - ../../vars/global/host_memory_oversubscription.yml
    - ../../vars/global/cgroup_tiering.yml
  tasks:
    - name: Query current systemd scope units
      ansible.builtin.command:
        argv:
          - systemctl
          - list-units
          - --type=scope
          - --all
          - --no-pager
      register: cgroup_tiering_systemctl_scope_units
      changed_when: false

    - name: Resolve live VM scope names from current systemd output
      ansible.builtin.set_fact:
        cgroup_tiering_vm_scope_names: >-
          {{
            cgroup_tiering_vm_scope_names | default({}) | combine(
              {
                vm_name: (
                  (
                    cgroup_tiering_systemctl_scope_units.stdout_lines
                    | select('search', vm_name)
                    | list
                    | first
                    | default('')
                  ).split() | first | default('<unresolved>')
                )
              }
            )
          }}
      loop: "{{ cgroup_tiering.managed_vm_names }}"
      loop_control:
        loop_var: vm_name
        label: "{{ vm_name }}"

    - name: Show resolved scope names
      ansible.builtin.debug:
        msg:
          - "VM: {{ vm_name }}"
          - "Scope: {{ cgroup_tiering_vm_scope_names.get(vm_name, '<unresolved>') }}"
      loop: "{{ cgroup_tiering.managed_vm_names }}"
      loop_control:
        loop_var: vm_name
        label: "{{ vm_name }}"

    - name: Read current AllowedCPUs and CPUWeight for resolved scopes
      ansible.builtin.command:
        argv:
          - systemctl
          - show
          - "{{ cgroup_tiering_vm_scope_names[vm_name] }}"
          - -p
          - AllowedCPUs
          - -p
          - CPUWeight
      register: cgroup_tiering_scope_properties
      changed_when: false
      failed_when: false
      loop: "{{ cgroup_tiering.managed_vm_names }}"
      loop_control:
        loop_var: vm_name
        label: "{{ vm_name }}"
      when: cgroup_tiering_vm_scope_names.get(vm_name, '') != '<unresolved>'

    - name: Show current scope properties
      ansible.builtin.debug:
        msg: "{{ item.stdout_lines | default(['<unavailable>']) }}"
      loop: "{{ cgroup_tiering_scope_properties.results | default([]) }}"

    - name: Read current vCPU pinning for each managed VM
      ansible.builtin.command:
        argv:
          - virsh
          - vcpupin
          - "{{ cgroup_tiering.managed_vm_domains.get(vm_name, vm_name) }}"
      register: cgroup_tiering_vcpupin_status
      changed_when: false
      loop: "{{ cgroup_tiering.managed_vm_names }}"
      loop_control:
        loop_var: vm_name
        label: "{{ vm_name }}"

    - name: Read current emulator pinning for each managed VM
      ansible.builtin.command:
        argv:
          - virsh
          - emulatorpin
          - "{{ cgroup_tiering.managed_vm_domains.get(vm_name, vm_name) }}"
      register: cgroup_tiering_emulatorpin_status
      changed_when: false
      loop: "{{ cgroup_tiering.managed_vm_names }}"
      loop_control:
        loop_var: vm_name
        label: "{{ vm_name }}"

    - name: Show current vCPU pinning state
      ansible.builtin.debug:
        msg: "{{ item.stdout_lines | default(['<unavailable>']) }}"
      loop: "{{ cgroup_tiering_vcpupin_status.results | default([]) }}"

    - name: Show current emulator pinning state
      ansible.builtin.debug:
        msg: "{{ item.stdout_lines | default(['<unavailable>']) }}"
      loop: "{{ cgroup_tiering_emulatorpin_status.results | default([]) }}"

    - name: Build per-scope status state
      ansible.builtin.set_fact:
        cgroup_tiering_scope_state: >-
          {{
            cgroup_tiering_scope_state | default({}) | combine(
              {
                (item.vm_name | default(item.item)): {
                  'allowed_cpus': (
                    (
                      item.stdout_lines
                      | select('search', '^AllowedCPUs=')
                      | list
                      | first
                      | default('AllowedCPUs=<unknown>')
                    ).split('=', 1)[1]
                  ),
                  'cpu_weight': (
                    (
                      item.stdout_lines
                      | select('search', '^CPUWeight=')
                      | list
                      | first
                      | default('CPUWeight=<unknown>')
                    ).split('=', 1)[1]
                  )
                }
              }
            )
          }}
      loop: "{{ cgroup_tiering_scope_properties.results | default([]) }}"
      loop_control:
        label: "{{ item.vm_name | default(item.item | default('<unknown>')) }}"

    - name: Build per-VM pinning status state
      ansible.builtin.set_fact:
        cgroup_tiering_vm_state: >-
          {{
            cgroup_tiering_vm_state | default({}) | combine(
              {
                (item.vm_name | default(item.item)): {
                  'live_vcpu_cpuset_summary': (
                    (
                      item.stdout_lines[2:]
                      if (item.stdout_lines | length) > 2
                      else []
                    )
                    | map('split')
                    | map('last')
                    | unique
                    | list
                  )
                }
              }
            )
          }}
      loop: "{{ cgroup_tiering_vcpupin_status.results | default([]) }}"
      loop_control:
        label: "{{ item.vm_name | default(item.item | default('<unknown>')) }}"

    - name: Add emulator pinning to per-VM status state
      ansible.builtin.set_fact:
        cgroup_tiering_vm_state: >-
          {{
            cgroup_tiering_vm_state | combine(
              {
                (item.vm_name | default(item.item)): (
                  cgroup_tiering_vm_state[(item.vm_name | default(item.item))]
                  | combine(
                    {
                      'live_emulator_cpuset_summary': (
                        (
                          item.stdout_lines[2:]
                          if (item.stdout_lines | length) > 2
                          else []
                        )
                        | map('split', ': ')
                        | map('last')
                        | unique
                        | list
                      )
                    }
                  )
                )
              }
            )
          }}
      loop: "{{ cgroup_tiering_emulatorpin_status.results | default([]) }}"
      loop_control:
        label: "{{ item.vm_name | default(item.item | default('<unknown>')) }}"

    - name: Detect whether clock-tiering layout is live
      ansible.builtin.set_fact:
        cgroup_tiering_clock_mode_live: >-
          {{
            (
              cgroup_tiering.managed_vm_names
              | map('extract', cgroup_tiering_vm_state)
              | map(attribute='live_emulator_cpuset_summary')
              | unique
              | list
            ) == [[cgroup_tiering.qemu_emulatorpin_cpus]]
            and
            (
              clock_frequency_tiering.vm_policies['kvm-worker-01'].vcpu_cpuset in
              cgroup_tiering_vm_state['kvm-worker-01'].live_vcpu_cpuset_summary
            )
            and
            (
              clock_frequency_tiering.vm_policies['kvm-worker-02'].vcpu_cpuset in
              cgroup_tiering_vm_state['kvm-worker-02'].live_vcpu_cpuset_summary
            )
            and
            (
              clock_frequency_tiering.vm_policies['kvm-worker-03'].vcpu_cpuset in
              cgroup_tiering_vm_state['kvm-worker-03'].live_vcpu_cpuset_summary
            )
          }}

    - name: Detect whether shared execution pool layout is live
      ansible.builtin.set_fact:
        cgroup_tiering_shared_pool_mode_live: >-
          {{
            (
              cgroup_tiering.managed_vm_names
              | map('extract', cgroup_tiering_vm_state)
              | map(attribute='live_emulator_cpuset_summary')
              | unique
              | list
            ) == [[cgroup_tiering.qemu_emulatorpin_cpus]]
            and
            (
              cgroup_tiering.guest_shared_cpus in
              cgroup_tiering_vm_state['kvm-worker-01'].live_vcpu_cpuset_summary
            )
            and
            (
              cgroup_tiering.guest_shared_cpus in
              cgroup_tiering_vm_state['kvm-worker-02'].live_vcpu_cpuset_summary
            )
            and
            (
              cgroup_tiering.guest_shared_cpus in
              cgroup_tiering_vm_state['kvm-worker-03'].live_vcpu_cpuset_summary
            )
            and
            (cgroup_tiering_scope_state['kvm-worker-01'].cpu_weight == contention_tiering.tier_weights.gold | string)
            and
            (cgroup_tiering_scope_state['kvm-worker-02'].cpu_weight == contention_tiering.tier_weights.silver | string)
            and
            (cgroup_tiering_scope_state['kvm-worker-03'].cpu_weight == contention_tiering.tier_weights.bronze | string)
          }}

    - name: Detect whether stock layout is live
      ansible.builtin.set_fact:
        cgroup_tiering_stock_mode_live: >-
          {{
            (
              cgroup_tiering.managed_vm_names
              | map('extract', cgroup_tiering_vm_state)
              | map(attribute='live_vcpu_cpuset_summary')
              | map('first')
              | unique
              | list
            ) == [clock_frequency_tiering.default_stock_cpuset]
            and
            (
              cgroup_tiering.managed_vm_names
              | map('extract', cgroup_tiering_vm_state)
              | map(attribute='live_emulator_cpuset_summary')
              | map('first')
              | unique
              | list
            ) == [clock_frequency_tiering.default_stock_cpuset]
            and
            (
              cgroup_tiering.managed_vm_names
              | map('extract', cgroup_tiering_scope_state)
              | map(attribute='allowed_cpus')
              | unique
              | list
            ) == ['']
            and
            (
              cgroup_tiering.managed_vm_names
              | map('extract', cgroup_tiering_scope_state)
              | map(attribute='cpu_weight')
              | unique
              | list
            ) == ['[not set]']
          }}

    - name: Set current host resource state summary
      ansible.builtin.set_fact:
        cgroup_tiering_state_label: >-
          {%- if cgroup_tiering_clock_mode_live | bool -%}
          clock-tiering
          {%- elif cgroup_tiering_shared_pool_mode_live | bool -%}
          shared execution pool
          {%- elif cgroup_tiering_stock_mode_live | bool -%}
          stock
          {%- else -%}
          mixed
          {%- endif -%}
        cgroup_tiering_state_note: >-
          {%- if cgroup_tiering_clock_mode_live | bool -%}
          Dedicated worker lanes and per-lane frequency caps are live.
          {%- elif cgroup_tiering_shared_pool_mode_live | bool -%}
          Guest vCPUs share CPUs {{ cgroup_tiering.guest_shared_cpus }}, emulator threads stay on {{ cgroup_tiering.qemu_emulatorpin_cpus }}, and Gold/Silver/Bronze weights are live.
          {%- elif cgroup_tiering_stock_mode_live | bool -%}
          No shared execution pool placement, contention weighting, or clock-lane controls are active.
          {%- else -%}
          Some controls are active, but the host does not match stock, shared execution pool, or clock-tiering exactly.
          {%- endif -%}

    - name: Show current host resource state summary
      ansible.builtin.debug:
        msg:
          - "Current state: {{ cgroup_tiering_state_label }}"
          - "{{ cgroup_tiering_state_note }}"
