---
- name: Report current host memory oversubscription policy
  hosts: hypervisors
  become: true
  gather_facts: false
  vars_files:
    - ../../vars/global/host_memory_oversubscription.yml
  tasks:
    - name: Check the host memory oversubscription service enabled state
      ansible.builtin.command:
        argv:
          - systemctl
          - is-enabled
          - stakkr-host-memory-oversubscription.service
      register: stakkr_host_memory_oversubscription_enabled
      changed_when: false
      failed_when: false

    - name: Check the host memory oversubscription service active state
      ansible.builtin.command:
        argv:
          - systemctl
          - is-active
          - stakkr-host-memory-oversubscription.service
      register: stakkr_host_memory_oversubscription_active
      changed_when: false
      failed_when: false

    - name: Check whether the zram device is active
      ansible.builtin.shell: |
        set -euo pipefail
        swapon --show=NAME --noheadings | awk '$1=="/dev/{{ host_memory_oversubscription.zram.device_name }}"{found=1} END{exit(found?0:1)}'
      args:
        executable: /bin/bash
      register: stakkr_host_memory_oversubscription_zram_active
      changed_when: false
      failed_when: false
      when: host_memory_oversubscription.zram.enabled | bool

    - name: Read the current THP enabled mode
      ansible.builtin.command:
        argv:
          - cat
          - /sys/kernel/mm/transparent_hugepage/enabled
      register: stakkr_host_memory_oversubscription_thp_enabled
      changed_when: false
      failed_when: false
      when: host_memory_oversubscription.transparent_hugepages.enabled | bool

    - name: Read the current THP defrag mode
      ansible.builtin.command:
        argv:
          - cat
          - /sys/kernel/mm/transparent_hugepage/defrag
      register: stakkr_host_memory_oversubscription_thp_defrag
      changed_when: false
      failed_when: false
      when: host_memory_oversubscription.transparent_hugepages.enabled | bool

    - name: Read the current KSM run state
      ansible.builtin.command:
        argv:
          - cat
          - /sys/kernel/mm/ksm/run
      register: stakkr_host_memory_oversubscription_ksm_run
      changed_when: false
      failed_when: false
      when: host_memory_oversubscription.ksm.enabled | bool

    - name: Read the current KSM pages-to-scan value
      ansible.builtin.command:
        argv:
          - cat
          - /sys/kernel/mm/ksm/pages_to_scan
      register: stakkr_host_memory_oversubscription_ksm_pages_to_scan
      changed_when: false
      failed_when: false
      when: host_memory_oversubscription.ksm.enabled | bool

    - name: Read the current KSM sleep interval
      ansible.builtin.command:
        argv:
          - cat
          - /sys/kernel/mm/ksm/sleep_millisecs
      register: stakkr_host_memory_oversubscription_ksm_sleep_millisecs
      changed_when: false
      failed_when: false
      when: host_memory_oversubscription.ksm.enabled | bool

    - name: Show current host memory oversubscription summary
      ansible.builtin.debug:
        msg:
          - "Memory policy service enabled: {{ stakkr_host_memory_oversubscription_enabled.stdout | default('disabled') | trim }}"
          - "Memory policy service active: {{ stakkr_host_memory_oversubscription_active.stdout | default('inactive') | trim }}"
          - "zram active: {{ 'yes' if (stakkr_host_memory_oversubscription_zram_active.rc | default(1)) == 0 else 'no' }}"
          - "THP enabled: {{ stakkr_host_memory_oversubscription_thp_enabled.stdout | default('<unavailable>') | trim }}"
          - "THP defrag: {{ stakkr_host_memory_oversubscription_thp_defrag.stdout | default('<unavailable>') | trim }}"
          - "KSM run: {{ stakkr_host_memory_oversubscription_ksm_run.stdout | default('<unavailable>') | trim }}"
          - "KSM pages_to_scan: {{ stakkr_host_memory_oversubscription_ksm_pages_to_scan.stdout | default('<unavailable>') | trim }}"
          - "KSM sleep_millisecs: {{ stakkr_host_memory_oversubscription_ksm_sleep_millisecs.stdout | default('<unavailable>') | trim }}"
