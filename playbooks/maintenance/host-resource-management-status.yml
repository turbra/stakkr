---
- name: Report current host resource management policy
  hosts: hypervisors
  become: true
  gather_facts: false
  vars_files:
    - ../../vars/global/host_resource_management.yml
  tasks:
    - name: Read the current systemd manager host resource policy file
      ansible.builtin.command:
        argv:
          - cat
          - /etc/systemd/system.conf.d/90-stakkr-host-resource-management.conf
      register: stakkr_host_resource_management_manager_conf
      changed_when: false
      failed_when: false

    - name: Read the current performance-domain slice definitions
      ansible.builtin.command:
        argv:
          - cat
          - "/etc/systemd/system/{{ item }}"
      loop:
        - machine-gold.slice
        - machine-silver.slice
        - machine-bronze.slice
      loop_control:
        label: "{{ item }}"
      register: stakkr_host_resource_management_slices
      changed_when: false
      failed_when: false

    - name: Read the irqbalance banned CPU list
      ansible.builtin.command:
        argv:
          - bash
          - -lc
          - "grep '^IRQBALANCE_BANNED_CPULIST=' /etc/sysconfig/irqbalance"
      register: stakkr_host_resource_management_irqbalance
      changed_when: false
      failed_when: false

    - name: Derive the current host resource management live state
      ansible.builtin.set_fact:
        stakkr_host_resource_management_live_state: >-
          {%- set manager_present = (stakkr_host_resource_management_manager_conf.rc | default(1)) == 0 -%}
          {%- set gold_present = ((stakkr_host_resource_management_slices.results[0].rc | default(1)) == 0) -%}
          {%- set silver_present = ((stakkr_host_resource_management_slices.results[1].rc | default(1)) == 0) -%}
          {%- set bronze_present = ((stakkr_host_resource_management_slices.results[2].rc | default(1)) == 0) -%}
          {%- set irq_required = host_resource_management.host_policy.manage_irqbalance_guest_ban | bool -%}
          {%- set irq_present = (stakkr_host_resource_management_irqbalance.rc | default(1)) == 0 -%}
          {%- set required_present = manager_present and gold_present and silver_present and bronze_present and ((not irq_required) or irq_present) -%}
          {%- set any_present = manager_present or gold_present or silver_present or bronze_present or irq_present -%}
          {{ 'active' if required_present else ('partial' if any_present else 'not applied') }}

    - name: Show configured host resource management target
      ansible.builtin.debug:
        msg:
          - "Configured target policy: shared execution pool host foundation"
          - "Host reserved CPUs: {{ host_resource_management.cpu_pools.host_reserved }}"
          - "Host housekeeping CPUs: {{ host_resource_management.cpu_pools.host_housekeeping }}"
          - "Host emulator CPUs: {{ host_resource_management.cpu_pools.host_emulator }}"
          - "Guest-domain CPUs: {{ host_resource_management.cpu_pools.guest_domain }}"
          - "Gold CPUWeight: {{ host_resource_management.performance_domains.gold.cpu_weight }}"
          - "Silver CPUWeight: {{ host_resource_management.performance_domains.silver.cpu_weight }}"
          - "Bronze CPUWeight: {{ host_resource_management.performance_domains.bronze.cpu_weight }}"

    - name: Show current host resource management live summary
      ansible.builtin.debug:
        msg:
          - "Live host resource management state: {{ stakkr_host_resource_management_live_state }}"
          - >-
            {{
              'Host foundation files are present.'
              if stakkr_host_resource_management_live_state == 'active'
              else (
                'Some host foundation files are present, but the policy is incomplete.'
                if stakkr_host_resource_management_live_state == 'partial'
                else 'Host foundation files are not applied.'
              )
            }}

    - name: Show current systemd manager resource policy file
      ansible.builtin.debug:
        msg: "{{ stakkr_host_resource_management_manager_conf.stdout_lines | default(['<missing>']) }}"

    - name: Show current performance-domain slices
      ansible.builtin.debug:
        msg: "{{ item.stdout_lines | default(['<missing>']) }}"
      loop: "{{ stakkr_host_resource_management_slices.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Show current irqbalance policy
      ansible.builtin.debug:
        msg: "{{ stakkr_host_resource_management_irqbalance.stdout | default('<not set>') }}"
