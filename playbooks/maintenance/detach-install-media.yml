---
- name: Detach OpenShift agent media and restore disk-first boot order
  hosts: hypervisors
  become: true
  gather_facts: false
  vars_files:
    - ../../vars/cluster/openshift_install_cluster.yml
    - ../../vars/guests/openshift_cluster_vm.yml
  tasks:
    - name: Detach OpenShift agent media from all cluster VMs
      ansible.builtin.include_role:
        name: libvirt_cdrom_cleanup
      vars:
        libvirt_cdrom_cleanup_domain: >-
          {{ item.name }}.{{ openshift_cluster_vm_defaults.domain }}
        libvirt_cdrom_cleanup_media_path: >-
          {{
            (item.access | default({})).agent_boot_media_path
            | default(openshift_cluster_vm_defaults.access.agent_boot_media_path)
          }}
        libvirt_cdrom_cleanup_reset_boot_to_hd_only: true
        libvirt_cdrom_cleanup_remove_device: false
      loop: "{{ openshift_cluster_nodes }}"
      loop_control:
        label: "{{ item.name }}"
