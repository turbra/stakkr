---
- name: Apply first-pass contention guarantees to live systemd VM scopes
  hosts: hypervisors
  become: true
  gather_facts: false
  vars_files:
    - ../../vars/global/host_resource_management.yml
    - ../../vars/global/host_memory_oversubscription.yml
    - ../../vars/global/cgroup_tiering.yml
  tasks:
    - name: Validate that contention tiering is enabled and populated
      ansible.builtin.assert:
        that:
          - contention_tiering.enabled | bool
          - contention_tiering.tier_weights | length > 0
          - contention_tiering.vm_tiers | length > 0

    - name: Query current systemd scope units
      ansible.builtin.command:
        argv:
          - systemctl
          - list-units
          - --type=scope
          - --all
          - --no-pager
      register: contention_tiering_scope_units
      changed_when: false

    - name: Resolve live VM scope names from current systemd output
      ansible.builtin.set_fact:
        contention_tiering_scope_names: >-
          {{
            contention_tiering_scope_names | default({}) | combine(
              {
                vm_name: (
                  (
                    contention_tiering_scope_units.stdout_lines
                    | select('search', vm_name)
                    | list
                    | first
                    | default('')
                  ).split() | first | default('<unresolved>')
                )
              }
            )
          }}
      loop: "{{ contention_tiering.managed_vm_names }}"
      loop_control:
        loop_var: vm_name
        label: "{{ vm_name }}"

    - name: Fail if any VM scope could not be resolved safely
      ansible.builtin.assert:
        that:
          - contention_tiering_scope_names.get(vm_name, '') | length > 0
          - contention_tiering_scope_names.get(vm_name, '') is search('^machine-qemu')
          - contention_tiering.vm_tiers.get(vm_name, '') in contention_tiering.tier_weights
        fail_msg: >-
          Unable to resolve a valid machine-qemu scope or contention tier for {{ vm_name }}.
      loop: "{{ contention_tiering.managed_vm_names }}"
      loop_control:
        loop_var: vm_name
        label: "{{ vm_name }}"

    - name: Capture current CPU properties before contention apply
      ansible.builtin.command:
        argv:
          - systemctl
          - show
          - "{{ contention_tiering_scope_names[vm_name] }}"
          - -p
          - AllowedCPUs
          - -p
          - CPUWeight
      register: contention_tiering_pre_apply_properties
      changed_when: false
      loop: "{{ contention_tiering.managed_vm_names }}"
      loop_control:
        loop_var: vm_name
        label: "{{ vm_name }}"

    - name: Show pre-apply contention state
      ansible.builtin.debug:
        msg:
          - "VM: {{ item.vm_name | default(item.item) }}"
          - "Tier: {{ contention_tiering.vm_tiers[item.vm_name | default(item.item)] }}"
          - "Target CPUWeight: {{ contention_tiering.tier_weights[contention_tiering.vm_tiers[item.vm_name | default(item.item)]] }}"
          - "{{ item.stdout_lines | join(' | ') }}"
      loop: "{{ contention_tiering_pre_apply_properties.results }}"
      loop_control:
        label: "{{ item.vm_name | default(item.item | default('<unknown>')) }}"

    - name: Apply tier CPUWeight to each live VM scope
      ansible.builtin.command:
        argv:
          - systemctl
          - set-property
          - "{{ contention_tiering_scope_names[vm_name] }}"
          - "CPUWeight={{ contention_tiering.tier_weights[contention_tiering.vm_tiers[vm_name]] }}"
      loop: "{{ contention_tiering.managed_vm_names }}"
      loop_control:
        loop_var: vm_name
        label: "{{ vm_name }}"

    - name: Capture CPU properties after contention apply
      ansible.builtin.command:
        argv:
          - systemctl
          - show
          - "{{ contention_tiering_scope_names[vm_name] }}"
          - -p
          - AllowedCPUs
          - -p
          - CPUWeight
      register: contention_tiering_post_apply_properties
      changed_when: false
      loop: "{{ contention_tiering.managed_vm_names }}"
      loop_control:
        loop_var: vm_name
        label: "{{ vm_name }}"

    - name: Show post-apply contention state
      ansible.builtin.debug:
        msg:
          - "VM: {{ item.vm_name | default(item.item) }}"
          - "Tier: {{ contention_tiering.vm_tiers[item.vm_name | default(item.item)] }}"
          - "Target CPUWeight: {{ contention_tiering.tier_weights[contention_tiering.vm_tiers[item.vm_name | default(item.item)]] }}"
          - "{{ item.stdout_lines | join(' | ') }}"
      loop: "{{ contention_tiering_post_apply_properties.results }}"
      loop_control:
        label: "{{ item.vm_name | default(item.item | default('<unknown>')) }}"
