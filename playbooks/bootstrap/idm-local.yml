---
- name: Build a local IdM virtual machine on the KVM host
  hosts: hypervisors
  become: true
  gather_facts: false
  vars_files:
    - ../../vars/global/host_resource_management.yml
    - ../../vars/global/rhsm.yml
    - ../../vars/guests/idm_vm.yml

  tasks:
    - name: Derive local IdM VM identity facts
      ansible.builtin.set_fact:
        idm_local_vm_name: >-
          {{
            idm_vm.name
            if ('.' not in idm_vm.name)
            else (
              idm_vm.name
              | regex_replace('\\.' ~ (idm_vm.domain | regex_escape) ~ '$', '')
            )
          }}
        idm_local_vm_fqdn: >-
          {{
            idm_vm.name
            if (idm_vm.name.endswith('.' ~ idm_vm.domain) or idm_vm.name == idm_vm.domain)
            else (idm_vm.name ~ '.' ~ idm_vm.domain)
          }}

    - name: Derive local IdM runtime facts
      ansible.builtin.set_fact:
        idm_local_vm_ip_cidr: "{{ idm_vm.network.ipv4_address }}/{{ idm_vm.network.prefix_length }}"
        idm_local_runtime_dir: "{{ idm_local.runtime_root }}/{{ idm_local_vm_name }}"
        idm_local_cloudinit_dir: "{{ idm_local.runtime_root }}/{{ idm_local_vm_name }}/cloudinit"
        idm_local_cloudinit_iso: "{{ idm_local.runtime_root }}/{{ idm_local_vm_name }}/{{ idm_local_vm_name }}-cidata.iso"
        idm_local_performance_domain_settings: "{{ host_resource_management.performance_domains[idm_vm.performance_domain.tier] }}"
        idm_local_network_attachment_type: "{{ idm_vm.network.attachment_type | default('libvirt-network') }}"

    - name: Initialize local IdM virt-install cputune entries
      ansible.builtin.set_fact:
        idm_local_cputune_entries: >-
          {{
            [
              'shares=' ~ (idm_local_performance_domain_settings.cpu_shares | string),
              'emulatorpin.cpuset=' ~ host_resource_management.cpu_pools.host_emulator
            ]
            + (
              [
                'iothreadpin0.iothread=1',
                'iothreadpin0.cpuset=' ~ host_resource_management.cpu_pools.host_emulator
              ]
              if (idm_vm.performance_domain.iothreads | int) > 0
              else []
            )
          }}

    - name: Add local IdM vCPU pinning entries to the virt-install cputune list
      ansible.builtin.set_fact:
        idm_local_cputune_entries: >-
          {{
            idm_local_cputune_entries
            + [
                'vcpupin' ~ (item | string) ~ '.vcpu=' ~ (item | string),
                'vcpupin' ~ (item | string) ~ '.cpuset=' ~ host_resource_management.cpu_pools.guest_domain
              ]
          }}
      loop: "{{ range(0, idm_vm.resources.vcpus | int) | list }}"

    - name: Derive local IdM virt-install performance-domain arguments
      ansible.builtin.set_fact:
        idm_local_performance_args: >-
          {{
            [
              '--resource',
              'partition=' ~ idm_local_performance_domain_settings.partition,
              '--cputune',
              idm_local_cputune_entries | join(',')
            ]
            + (
              [
                '--iothreads',
                'iothreads=' ~ (idm_vm.performance_domain.iothreads | string)
              ]
              if (idm_vm.performance_domain.iothreads | int) > 0
              else []
            )
          }}

    - name: Derive local IdM virt-install network argument
      ansible.builtin.set_fact:
        idm_local_network_arg: >-
          {{
            (
              'bridge=' ~ idm_vm.network.bridge_name
            )
            if idm_local_network_attachment_type == 'bridge'
            else
            (
              'network=' ~ idm_vm.network.libvirt_network
              ~ (
                  ',portgroup=' ~ idm_vm.network.libvirt_portgroup
                  if (idm_vm.network.libvirt_portgroup | default('') | length) > 0
                  else ''
                )
            )
          }}{{ ',model=' ~ (idm_vm.network.model | default('virtio')) }}{{ ',mac=' ~ idm_vm.network.mac_address }}

    - name: Validate local IdM orchestration data
      ansible.builtin.assert:
        that:
          - idm_vm.name | length > 0
          - idm_vm.domain | length > 0
          - idm_vm.source_image | length > 0
          - idm_vm.source_image_format in ['qcow2', 'raw']
          - idm_vm.disk_path | length > 0
          - idm_vm.disk_format | length > 0
          - idm_local_network_attachment_type in ['bridge', 'libvirt-network']
          - >-
            (
              idm_local_network_attachment_type == 'bridge' and
              (idm_vm.network.bridge_name | default('') | length) > 0
            ) or (
              idm_local_network_attachment_type == 'libvirt-network' and
              (idm_vm.network.libvirt_network | default('') | length) > 0
            )
          - idm_vm.network.interface_name | length > 0
          - idm_vm.network.mac_address | length > 0
          - idm_vm.network.ipv4_address | length > 0
          - (idm_vm.network.prefix_length | int) > 0
          - idm_vm.network.gateway | length > 0
          - idm_vm.access.admin_user | length > 0
          - idm_vm.access.ssh_private_key_file | length > 0
          - (idm_vm.access.ssh_authorized_keys | length) > 0 or (idm_vm.access.admin_password | length) > 0
        fail_msg: >-
          vars/guests/idm_vm.yml is missing required local IdM guest settings.
          Provide the guest identity, source image, disk path, network data, and
          at least one access path.

    - name: Fail when an ISO source image is requested for the local image-seed workflow
      ansible.builtin.assert:
        that:
          - idm_vm.source_image_format in ['qcow2', 'raw']
        fail_msg: >-
          The current local IdM builder expects a seeded guest disk image
          (qcow2 or raw). ISO install media is not supported by this playbook yet.

    - name: Validate RHSM data when guest registration is enabled
      ansible.builtin.assert:
        that:
          - >-
            (
              idm_vm.subscription.activation_key | length > 0 and
              idm_vm.subscription.organization_id | length > 0
            ) or (
              idm_vm.subscription.username | length > 0 and
              idm_vm.subscription.password | length > 0
            )
        fail_msg: >-
          Guest subscription enablement requires either activation_key +
          organization_id or username + password in vars/guests/idm_vm.yml.
      when: idm_vm.subscription.enabled | bool

    - name: Install packages needed for the local IdM VM build workflow
      ansible.builtin.command:
        argv:
          - dnf
          - install
          - -y
          - libguestfs-tools-c
          - qemu-img
          - qemu-kvm
          - virt-install
          - xorriso
      changed_when: true

    - name: Check whether the local IdM disk image is present
      ansible.builtin.stat:
        path: "{{ idm_vm.disk_path }}"
      register: idm_local_disk_stat

    - name: Derive whether the local IdM disk must be seeded from the image
      ansible.builtin.set_fact:
        idm_local_seed_disk_from_image: >-
          {{
            (idm_vm.provisioning.rebuild_disk_from_image | bool) or
            not (idm_local_disk_stat.stat.exists | default(false))
          }}

    - name: Check whether the base source image is present
      ansible.builtin.stat:
        path: "{{ idm_vm.source_image }}"
      register: idm_local_source_image_stat
      when: idm_local_seed_disk_from_image | bool

    - name: Fail when the base source image is missing
      ansible.builtin.assert:
        that:
          - idm_local_source_image_stat.stat.exists
        fail_msg: >-
          Local IdM source image {{ idm_vm.source_image }} was not found.
      when: idm_local_seed_disk_from_image | bool

    - name: Check whether the local IdM libvirt domain already exists
      ansible.builtin.command:
        argv:
          - virsh
          - dominfo
          - "{{ idm_local_vm_fqdn }}"
      register: idm_local_domain_info
      changed_when: false
      failed_when: false

    - name: Stop the existing local IdM VM before disk reseed or recreation
      ansible.builtin.command:
        argv:
          - virsh
          - destroy
          - "{{ idm_local_vm_fqdn }}"
      when:
        - >-
          idm_vm.provisioning.recreate_domain | bool or
          idm_local_seed_disk_from_image | bool
        - idm_local_domain_info.rc == 0
      changed_when: true
      failed_when: false

    - name: Undefine the existing local IdM VM before reseeding the disk
      ansible.builtin.command:
        argv:
          - virsh
          - undefine
          - "{{ idm_local_vm_fqdn }}"
          - --nvram
      when:
        - >-
          idm_vm.provisioning.recreate_domain | bool or
          idm_local_seed_disk_from_image | bool
        - idm_local_domain_info.rc == 0
      changed_when: true
      failed_when: false

    - name: Create the local IdM working directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop:
        - "{{ idm_local_cloudinit_dir }}"
        - "{{ idm_local_cloudinit_iso | dirname }}"
        - "{{ idm_vm.disk_path | dirname }}"

    - name: Render local IdM cloud-init metadata
      ansible.builtin.template:
        src: ../../templates/idm/meta-data.j2
        dest: "{{ idm_local_cloudinit_dir }}/meta-data"
        owner: root
        group: root
        mode: "0644"

    - name: Render local IdM cloud-init user-data
      ansible.builtin.template:
        src: ../../templates/idm/user-data.j2
        dest: "{{ idm_local_cloudinit_dir }}/user-data"
        owner: root
        group: root
        mode: "0600"

    - name: Render local IdM cloud-init network-config
      ansible.builtin.template:
        src: ../../templates/idm/network-config.j2
        dest: "{{ idm_local_cloudinit_dir }}/network-config"
        owner: root
        group: root
        mode: "0644"

    - name: Stage the local IdM SSH public key for offline guest injection
      ansible.builtin.copy:
        content: "{{ idm_vm.access.ssh_authorized_keys | first }}\n"
        dest: "{{ idm_local_cloudinit_dir }}/access.pub"
        owner: root
        group: root
        mode: "0600"
      when:
        - idm_local_seed_disk_from_image | bool
        - (idm_vm.access.ssh_authorized_keys | length) > 0

    - name: Rebuild the local IdM disk from the source image when requested
      ansible.builtin.command:
        argv:
          - qemu-img
          - convert
          - -p
          - -f
          - "{{ idm_vm.source_image_format }}"
          - -O
          - "{{ idm_vm.disk_format }}"
          - "{{ idm_vm.source_image }}"
          - "{{ idm_vm.disk_path }}"
      when: idm_local_seed_disk_from_image | bool
      changed_when: true

    - name: Inject local IdM access credentials into the reseeded guest disk
      ansible.builtin.command:
        argv: >-
          {{
            ['virt-customize', '-a', idm_vm.disk_path]
            + [
                '--run-command',
                'id -u ' ~ idm_vm.access.admin_user ~
                ' >/dev/null 2>&1 || useradd -m -G wheel -s /bin/bash ' ~
                idm_vm.access.admin_user,
                '--run-command',
                'usermod -aG wheel ' ~ idm_vm.access.admin_user,
                '--run-command',
                'printf ''%s\\n'' ' ~
                (idm_vm.access.admin_user ~ ' ALL=(ALL) NOPASSWD:ALL' | quote) ~
                ' > /etc/sudoers.d/90-' ~ idm_vm.access.admin_user,
                '--run-command',
                'chmod 0440 /etc/sudoers.d/90-' ~ idm_vm.access.admin_user
              ]
            + (
              [
                '--ssh-inject',
                idm_vm.access.admin_user ~ ':file:' ~ idm_local_cloudinit_dir ~ '/access.pub'
              ]
              if (idm_vm.access.ssh_authorized_keys | length) > 0
              else []
            )
            + (
              [
                '--password',
                idm_vm.access.admin_user ~ ':password:' ~ idm_vm.access.admin_password,
                '--password-crypto',
                'sha512'
              ]
              if (idm_vm.access.admin_password | length) > 0
              else []
            )
          }}
      when: idm_local_seed_disk_from_image | bool
      changed_when: true

    - name: Generate the local IdM cloud-init ISO
      ansible.builtin.command:
        argv:
          - xorriso
          - -as
          - mkisofs
          - -o
          - "{{ idm_local_cloudinit_iso }}"
          - -V
          - CIDATA
          - -J
          - -R
          - -graft-points
          - "user-data={{ idm_local_cloudinit_dir }}/user-data"
          - "meta-data={{ idm_local_cloudinit_dir }}/meta-data"
          - "network-config={{ idm_local_cloudinit_dir }}/network-config"
      changed_when: true

    - name: Ensure libvirt can read the local IdM cloud-init ISO
      ansible.builtin.file:
        path: "{{ idm_local_cloudinit_iso }}"
        owner: qemu
        group: qemu
        mode: "0644"

    - name: Install the local IdM VM when it is absent or recreation was requested
      ansible.builtin.command:
        argv: >-
          {{
            [
              'virt-install',
              '--name', idm_local_vm_fqdn,
              '--osinfo', idm_vm.osinfo,
              '--boot', idm_vm.boot.firmware,
              '--machine', idm_vm.boot.machine,
              '--memory', (idm_vm.resources.memory_mb | string),
              '--vcpus', (idm_vm.resources.vcpus | string),
              '--cpu', idm_vm.boot.cpu_model,
              '--controller', 'type=scsi,model=virtio-scsi',
              '--disk',
              'path=' ~ idm_vm.disk_path ~ ',format=' ~ idm_vm.disk_format ~ ',bus=scsi',
              '--disk', 'path=' ~ idm_local_cloudinit_iso ~ ',device=cdrom',
              '--network', idm_local_network_arg,
              '--rng', 'builtin',
              '--import',
              '--graphics', 'none',
              '--console', 'pty,target_type=serial',
              '--autostart',
              '--noautoconsole'
            ]
            + idm_local_performance_args
            + (
              ['--tpm', 'none']
              if not (idm_vm.boot.tpm_enabled | default(false) | bool)
              else []
            )
          }}
      when: >-
        idm_local_domain_info.rc != 0 or
        idm_vm.provisioning.recreate_domain | bool or
        idm_local_seed_disk_from_image | bool
      changed_when: true

    - name: Register the local IdM guest as a temporary Ansible host
      ansible.builtin.add_host:
        name: "{{ idm_local_vm_fqdn }}"
        groups:
          - idm_guest
        ansible_host: "{{ idm_vm.network.ipv4_address }}"
        ansible_user: "{{ idm_vm.access.admin_user }}"
        ansible_ssh_private_key_file: "{{ idm_vm.access.ssh_private_key_file }}"
        ansible_become: true
        ansible_ssh_common_args: >-
          -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null

    - name: Show local IdM build summary
      ansible.builtin.debug:
        msg:
          - "Local IdM domain: {{ idm_local_vm_fqdn }}"
          - "Disk path: {{ idm_vm.disk_path }}"
          - "Cloud-init ISO: {{ idm_local_cloudinit_iso }}"
          - "Network attachment: {{ idm_local_network_arg }}"
          - "IP address: {{ idm_vm.network.ipv4_address }}"

- name: Configure the local IdM guest
  hosts: idm_guest
  become: true
  gather_facts: false
  vars_files:
    - ../../vars/global/rhsm.yml
    - ../../vars/guests/idm_vm.yml

  pre_tasks:
    - name: Wait for the local IdM guest SSH port from the hypervisor network
      ansible.builtin.wait_for:
        host: "{{ idm_vm.network.ipv4_address }}"
        port: 22
        timeout: 900
        sleep: 10
      delegate_to: localhost
      become: false

    - name: Reset any cached SSH state before connecting to the local IdM guest
      ansible.builtin.meta: reset_connection

    - name: Wait for the local IdM guest to accept SSH connections
      ansible.builtin.wait_for_connection:
        timeout: 900
        sleep: 10

    - name: Gather local IdM guest facts after SSH is available
      ansible.builtin.setup:

  tasks:
    - name: Derive local IdM guest facts
      ansible.builtin.set_fact:
        idm_guest_vm_fqdn: >-
          {{
            idm_vm.name
            if (idm_vm.name.endswith('.' ~ idm_vm.domain) or idm_vm.name == idm_vm.domain)
            else (idm_vm.name ~ '.' ~ idm_vm.domain)
          }}

    - name: Validate the local IdM guest configuration data
      ansible.builtin.assert:
        that:
          - idm_server.realm | length > 0
          - idm_server.ds_password | length > 0
          - idm_server.admin_password | length > 0
          - idm_server.dns_forwarders | length > 0
          - idm_server.trusted_networks | length > 0
          - idm_server.ipa_packages | length > 0
          - idm_server.cockpit.packages | length > 0
          - idm_server.firewall_services | length > 0
          - idm_server.identity_groups | length > 0
          - idm_server.identity_users | length > 0
        fail_msg: >-
          vars/guests/idm_vm.yml is missing required idm_server settings for
          guest configuration.

    - name: Ensure guest configuration packages are installed
      ansible.builtin.command:
        argv: >-
          {{
            ['dnf', 'install', '-y'] +
            ['firewalld', 'oddjob', 'oddjob-mkhomedir'] +
            idm_server.ipa_packages +
            idm_server.cockpit.packages +
            idm_server.session_recording.packages
          }}
      changed_when: true

    - name: Ensure cockpit socket is enabled on the local IdM guest
      ansible.builtin.systemd_service:
        name: cockpit.socket
        state: started
        enabled: true

    - name: Ensure firewalld is enabled on the local IdM guest
      ansible.builtin.systemd_service:
        name: firewalld
        state: started
        enabled: true

    - name: Ensure oddjobd is enabled on the local IdM guest
      ansible.builtin.systemd_service:
        name: oddjobd.service
        state: started
        enabled: true

    - name: Check which guest firewall services are already enabled
      ansible.builtin.command:
        argv:
          - firewall-cmd
          - --permanent
          - "--query-service={{ item }}"
      register: idm_guest_firewall_service_queries
      changed_when: false
      failed_when: false
      loop: "{{ idm_server.firewall_services }}"

    - name: Open guest firewall services for IdM and Cockpit
      ansible.builtin.command:
        argv:
          - firewall-cmd
          - --permanent
          - "--add-service={{ item.item }}"
      loop: "{{ idm_guest_firewall_service_queries.results }}"
      when: item.rc != 0
      register: idm_guest_firewall_service_changes
      changed_when: true

    - name: Reload the guest firewall when services changed
      ansible.builtin.command:
        argv:
          - firewall-cmd
          - --reload
      when: >-
        idm_guest_firewall_service_changes is defined and
        (
          idm_guest_firewall_service_changes.results
          | selectattr('changed')
          | list
          | length > 0
        )
      changed_when: true

    - name: Install and configure the IdM server with integrated KRA
      ansible.builtin.include_role:
        name: freeipa.ansible_freeipa.ipaserver
      vars:
        state: present
        ipaserver_install_packages: false
        ipaserver_setup_firewalld: false
        ipaserver_no_host_dns: true
        ipaserver_hostname: "{{ idm_guest_vm_fqdn }}"
        ipaserver_ip_addresses:
          - "{{ idm_vm.network.ipv4_address }}"
        ipaserver_domain: "{{ idm_vm.domain }}"
        ipaserver_realm: "{{ idm_server.realm }}"
        ipadm_password: "{{ idm_server.ds_password }}"
        ipaadmin_password: "{{ idm_server.admin_password }}"
        ipaserver_setup_dns: "{{ idm_server.setup_dns | bool }}"
        ipaserver_forwarders: "{{ idm_server.dns_forwarders }}"
        ipaserver_no_forwarders: "{{ (idm_server.dns_forwarders | length) == 0 }}"
        ipaserver_setup_kra: true

    - name: Check whether Kerberos admin credentials are already cached
      ansible.builtin.command:
        argv:
          - klist
      register: idm_guest_klist
      changed_when: false
      failed_when: false

    - name: Acquire an admin Kerberos ticket for IPA CLI operations
      ansible.builtin.command:
        argv:
          - kinit
          - admin
        stdin: "{{ idm_server.admin_password }}\n"
      when: idm_guest_klist.rc != 0
      changed_when: true

    - name: Configure IPA global DNS forwarders
      ansible.builtin.command:
        argv: >-
          {{
            ['ipa', 'dnsconfig-mod'] +
            (
              idm_server.dns_forwarders
              | map('regex_replace', '^', '--forwarder=')
              | list
            )
          }}
      register: idm_guest_dnsconfig_mod
      changed_when: >-
        'no modifications to be performed'
        not in idm_guest_dnsconfig_mod.stderr
      failed_when: >-
        idm_guest_dnsconfig_mod.rc != 0 and
        'no modifications to be performed'
        not in idm_guest_dnsconfig_mod.stderr
      when: idm_server.setup_dns | bool

    - name: Build the list of reverse DNS zones required for static infrastructure records
      ansible.builtin.set_fact:
        idm_guest_static_reverse_zones: >-
          {{
            idm_server.static_dns_records
            | default([])
            | selectattr('record_type', 'equalto', 'PTR')
            | map(attribute='zone_name')
            | unique
            | list
          }}
      when: idm_server.setup_dns | bool

    - name: Ensure reverse DNS zones exist for static infrastructure records
      freeipa.ansible_freeipa.ipadnszone:
        ipaadmin_password: "{{ idm_server.admin_password }}"
        ipaapi_context: server
        name: "{{ item }}"
        name_server: "{{ idm_guest_vm_fqdn }}."
        admin_email: "hostmaster.{{ idm_vm.domain }}"
        dynamic_update: false
        state: present
      loop: "{{ idm_guest_static_reverse_zones }}"
      when:
        - idm_server.setup_dns | bool
        - idm_guest_static_reverse_zones | length > 0

    - name: Ensure static infrastructure DNS records exist
      freeipa.ansible_freeipa.ipadnsrecord:
        ipaadmin_password: "{{ idm_server.admin_password }}"
        ipaapi_context: server
        zone_name: "{{ item.zone_name }}"
        name: "{{ item.name }}"
        record_type: "{{ item.record_type }}"
        record_value: "{{ item.record_value }}"
        state: present
      loop: "{{ idm_server.static_dns_records | default([]) }}"
      loop_control:
        label: "{{ item.label | default(item.name) }}"
      when: idm_server.setup_dns | bool

    - name: Ensure the requested IPA groups exist
      freeipa.ansible_freeipa.ipagroup:
        ipaadmin_password: "{{ idm_server.admin_password }}"
        ipaapi_context: server
        name:
          - "{{ item }}"
        state: present
      loop: "{{ idm_server.identity_groups }}"

    - name: Ensure the configured IPA group password policies exist
      freeipa.ansible_freeipa.ipapwpolicy:
        ipaadmin_password: "{{ idm_server.admin_password }}"
        ipaapi_context: server
        name:
          - "{{ item.0 }}"
        maxlife: "{{ idm_server.password_policy.maxlife_days }}"
        minlife: "{{ idm_server.password_policy.minlife_hours }}"
        history: "{{ idm_server.password_policy.history_length }}"
        minclasses: "{{ idm_server.password_policy.minclasses }}"
        minlength: "{{ idm_server.password_policy.minlength }}"
        priority: "{{ item.1 }}"
        state: present
      loop: >-
        {{
          idm_server.identity_groups
          | zip(
              range(
                idm_server.password_policy.priority_start,
                idm_server.password_policy.priority_start
                + (idm_server.identity_groups | length * idm_server.password_policy.priority_step),
                idm_server.password_policy.priority_step
              )
            )
          | list
        }}
      when: idm_server.password_policy.enabled | default(false)

    - name: Ensure the requested IPA users exist with the lab-safe expiration
      freeipa.ansible_freeipa.ipauser:
        ipaadmin_password: "{{ idm_server.admin_password }}"
        ipaapi_context: server
        users:
          - name: "{{ item.name }}"
            first: "{{ item.first_name }}"
            last: "{{ item.last_name }}"
            password: "{{ item.password }}"
            shell: "{{ item.shell | default('/bin/bash') }}"
            passwordexpiration: "20360313235039"
            email:
              - "{{ item.name }}@{{ idm_vm.domain }}"
        state: present
      loop: "{{ idm_server.identity_users }}"
      loop_control:
        label: "{{ item.name }}"
      no_log: true

    - name: Ensure IPA group memberships match the configured users
      freeipa.ansible_freeipa.ipagroup:
        ipaadmin_password: "{{ idm_server.admin_password }}"
        ipaapi_context: server
        name:
          - "{{ item }}"
        action: member
        user: >-
          {{
            idm_server.identity_users
            | selectattr('groups', 'contains', item)
            | map(attribute='name')
            | list
          }}
        state: present
      loop: "{{ idm_server.identity_groups }}"

    - name: Ensure the configured IPA sudo rule exists with full admin access
      freeipa.ansible_freeipa.ipasudorule:
        ipaadmin_password: "{{ idm_server.admin_password }}"
        ipaapi_context: server
        name:
          - "{{ idm_server.sudo_policy.rule_name }}"
        description: "{{ idm_server.sudo_policy.description }}"
        group:
          - "{{ idm_server.sudo_policy.group }}"
        hostcategory: all
        cmdcategory: all
        runasusercategory: all
        runasgroupcategory: all
        sudooption:
          - "!authenticate"
        state: present
      when: idm_server.sudo_policy.enabled | default(false)

- name: Detach local IdM cloud-init media after guest configuration
  hosts: hypervisors
  become: true
  gather_facts: false
  vars_files:
    - ../../vars/global/rhsm.yml
    - ../../vars/guests/idm_vm.yml

  tasks:
    - name: Derive local IdM cleanup facts
      ansible.builtin.set_fact:
        idm_local_vm_name: >-
          {{
            idm_vm.name
            if ('.' not in idm_vm.name)
            else (
              idm_vm.name
              | regex_replace('\\.' ~ (idm_vm.domain | regex_escape) ~ '$', '')
            )
          }}
        idm_local_vm_fqdn: >-
          {{
            idm_vm.name
            if (idm_vm.name.endswith('.' ~ idm_vm.domain) or idm_vm.name == idm_vm.domain)
            else (idm_vm.name ~ '.' ~ idm_vm.domain)
          }}
        idm_local_cloudinit_iso: "{{ idm_local.runtime_root }}/{{ idm_local_vm_name }}/{{ idm_local_vm_name }}-cidata.iso"

    - name: Identify matching local IdM cloud-init CD-ROM targets in persistent XML
      ansible.builtin.shell: |
        set -euo pipefail
        virsh domblklist "{{ idm_local_vm_fqdn }}" --details \
          | awk -v media="{{ idm_local_cloudinit_iso }}" \
              '$2 == "cdrom" && ($4 == media || $4 == "-") {print $3}'
      args:
        executable: /bin/bash
      register: idm_local_cdrom_targets
      changed_when: false
      failed_when: false

    - name: Remove local IdM cloud-init CD-ROM devices from persistent XML
      ansible.builtin.command:
        argv:
          - virt-xml
          - "{{ idm_local_vm_fqdn }}"
          - --remove-device
          - --disk
          - "target={{ item }}"
      loop: "{{ idm_local_cdrom_targets.stdout_lines }}"
      when: idm_local_cdrom_targets.stdout_lines | length > 0
      changed_when: true

    - name: Reset local IdM guest boot order to disk only
      ansible.builtin.command:
        argv:
          - virt-xml
          - "{{ idm_local_vm_fqdn }}"
          - --edit
          - --boot
          - hd
      when: idm_local_cdrom_targets.stdout_lines | length > 0
      changed_when: true

    - name: Remove the local IdM cloud-init ISO from the hypervisor
      ansible.builtin.file:
        path: "{{ idm_local_cloudinit_iso }}"
        state: absent
