---
- name: Build one or more generic RHEL 10 virtual machines
  hosts: hypervisors
  become: true
  gather_facts: false
  vars_files:
    - ../../vars/global/host_resource_management.yml
    - ../../vars/global/rhsm.yml

  pre_tasks:
    - name: Validate generic RHEL 10 VM deployment data
      ansible.builtin.assert:
        that:
          - rhel10_vms is defined
          - rhel10_vms | length > 0
        fail_msg: >-
          Define one or more guests in rhel10_vms, for example with
          ansible-playbook ... -e @vars/guests/my-rhel10-vms.yml.

    - name: Set generic RHEL 10 VM runtime root
      ansible.builtin.set_fact:
        rhel10_vm_runtime_root: "{{ rhel10_vm_bootstrap.runtime_root | default('/var/lib/stakkr/rhel10-vms') }}"

  tasks:
    - name: Build each requested RHEL 10 guest
      ansible.builtin.include_tasks: tasks/rhel10-vm-local-libvirt-build.yml
      loop: "{{ rhel10_vms }}"
      loop_control:
        loop_var: rhel10_vm
        label: "{{ rhel10_vm.name }}"

- name: Wait for the requested RHEL 10 guests to accept SSH connections
  hosts: rhel10_vm_guests
  become: true
  gather_facts: false

  pre_tasks:
    - name: Wait for the guest SSH port from the hypervisor network
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: 22
        timeout: 900
        sleep: 10
      delegate_to: localhost
      become: false

    - name: Reset any cached SSH state before connecting to the guest
      ansible.builtin.meta: reset_connection

    - name: Wait for the guest to accept SSH connections
      ansible.builtin.wait_for_connection:
        timeout: 900
        sleep: 10

  tasks:
    - name: Gather guest facts after SSH is available
      ansible.builtin.setup:

    - name: Show generic RHEL 10 guest summary
      ansible.builtin.debug:
        msg:
          - "Guest: {{ inventory_hostname }}"
          - "SSH user: {{ ansible_user }}"
          - "IPv4 address: {{ ansible_host }}"

- name: Detach generic RHEL 10 cloud-init media after guest bootstrap
  hosts: hypervisors
  become: true
  gather_facts: false

  pre_tasks:
    - name: Validate generic RHEL 10 VM deployment data for cleanup
      ansible.builtin.assert:
        that:
          - rhel10_vms is defined
          - rhel10_vms | length > 0

    - name: Set generic RHEL 10 VM runtime root for cleanup
      ansible.builtin.set_fact:
        rhel10_vm_runtime_root: "{{ rhel10_vm_bootstrap.runtime_root | default('/var/lib/stakkr/rhel10-vms') }}"

  tasks:
    - name: Remove temporary cloud-init media for each requested guest
      ansible.builtin.include_tasks: tasks/rhel10-vm-local-libvirt-cleanup.yml
      loop: "{{ rhel10_vms }}"
      loop_control:
        loop_var: rhel10_vm
        label: "{{ rhel10_vm.name }}"
