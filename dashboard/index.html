<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stakkr Tiering Dashboard</title>
  <style>
    :root {
      --panel: #ffffff;
      --panel-strong: #f2f2f2;
      --ink: #151515;
      --muted: #4d4d4d;
      --line: #c7c7c7;
      --host: #292929;
      --gold: #8f6a00;
      --silver: #6a6e73;
      --bronze: #8c4f2b;
      --shadow: 0 18px 40px rgba(21, 21, 21, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(238, 0, 0, 0.16), transparent 26%),
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.06), transparent 22%),
        linear-gradient(160deg, #151515 0%, #292929 48%, #3c3f42 100%);
    }
    .page { max-width: 1320px; margin: 0 auto; padding: 32px 24px 56px; }
    .hero { display: grid; grid-template-columns: 1.4fr 1fr; gap: 20px; margin-bottom: 24px; }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 22px;
      box-shadow: var(--shadow);
    }
    .card strong {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: block;
      margin-bottom: 8px;
    }
    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 34px; line-height: 1.05; margin-bottom: 12px; }
    h2 { font-size: 20px; margin-bottom: 16px; }
    p.meta { color: var(--muted); line-height: 1.5; }
    .key-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-top: 18px; }
    .key, .scope, .vm {
      background: var(--panel-strong);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
    }
    .key .value { font-size: 20px; font-weight: 700; margin-top: 4px; }
    .layout, .section { margin-bottom: 24px; }
    .tier-layout { display: grid; grid-template-columns: 1.1fr 1.2fr 1fr 1fr 1fr; gap: 12px; }
    .tier-card, .cpu {
      border-radius: 14px;
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .tier-card { padding: 16px 14px; min-height: 150px; }
    .cpu { padding: 14px 10px; min-height: 126px; }
    .host { background: linear-gradient(180deg, #383838, var(--host)); }
    .pool { background: linear-gradient(180deg, #4d4d4d, #292929); }
    .gold { background: linear-gradient(180deg, #d9b300, var(--gold)); }
    .silver { background: linear-gradient(180deg, #a7abb0, var(--silver)); }
    .bronze { background: linear-gradient(180deg, #c47a43, var(--bronze)); }
    .tier-card .eyebrow { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.88; }
    .tier-card .title, .cpu .num { font-size: 22px; font-weight: 800; margin-top: 8px; }
    .tier-card .sub, .cpu .live { font-size: 14px; line-height: 1.45; opacity: 0.96; }
    .cpu-lane { display: grid; grid-template-columns: repeat(12, minmax(68px, 1fr)); gap: 10px; }
    .cpu .role { font-size: 14px; font-weight: 700; }
    .cpu .cap { font-size: 13px; opacity: 0.92; }
    .cpu .live { font-size: 12px; line-height: 1.35; }
    .scope-grid, .vm-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    .vm h3, .scope h3 { font-size: 18px; margin-bottom: 10px; }
    .vm pre, .scope pre {
      white-space: pre-wrap;
      margin: 10px 0 0;
      padding: 12px;
      border-radius: 12px;
      background: #f2f2f2;
      border: 1px solid var(--line);
      color: var(--ink);
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
    }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 14px; }
    th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid var(--line); }
    th { color: var(--muted); font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; }
    .note { color: var(--muted); font-size: 13px; margin-top: 10px; line-height: 1.5; }
    .error {
      background: #fff4f4;
      color: #7d1007;
      border: 1px solid #f3c0c0;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 24px;
      display: none;
    }
    @media (max-width: 1100px) {
      .hero, .scope-grid, .vm-grid, .tier-layout { grid-template-columns: 1fr; }
      .key-grid { grid-template-columns: repeat(2, 1fr); }
      .cpu-lane { grid-template-columns: repeat(4, minmax(68px, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="page">
    <div id="error" class="error"></div>
    <section class="hero">
      <div class="card">
        <strong>Stakkr</strong>
        <h1>Tiering Dashboard</h1>
        <p id="hero-meta" class="meta"></p>
        <div id="key-grid" class="key-grid"></div>
      </div>
      <div class="card">
        <strong>Configured Intent</strong>
        <p id="configured-intent" class="meta"></p>
      </div>
    </section>

    <section class="card layout">
      <strong>CPU Layout</strong>
      <h2>Current Host CPU Map</h2>
      <div id="cpu-layout"></div>
      <p id="cpu-layout-note" class="note"></p>
    </section>

    <section class="card section">
      <strong>Systemd Scope State</strong>
      <h2>Current `AllowedCPUs` And `CPUWeight`</h2>
      <div id="scope-grid" class="scope-grid"></div>
    </section>

    <section class="card section">
      <strong>Virsh Pinning</strong>
      <h2>Current Worker Pinning</h2>
      <div id="vm-grid" class="vm-grid"></div>
    </section>

    <section class="card">
      <strong>Per-CPU Clock State</strong>
      <h2 id="clock-heading"></h2>
      <table>
        <thead>
          <tr>
            <th>CPU</th>
            <th>Current Max</th>
            <th>Hardware Max</th>
          </tr>
        </thead>
        <tbody id="cpu-table-body"></tbody>
      </table>
    </section>
  </div>
  <script src="./app.js"></script>
</body>
</html>
