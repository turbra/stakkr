---
host_resource_management:
  enabled: true
  host_policy:
    manage_kernel_cmdline: false
    manage_systemd_cpu_affinity: false
    manage_irqbalance_guest_ban: false
  cpu_pools:
    host_reserved: "0-1"
    host_housekeeping: "0-1"
    host_emulator: "0-1"
    guest_domain: "2-11"
  kernel_cmdline:
    systemd_cpu_affinity: systemd.cpu_affinity=0-1
    irqaffinity: irqaffinity=0-1
  performance_domains:
    gold:
      partition: /machine/gold
      cpu_shares: 512
      cpu_weight: 512
      default_iothreads: 0
    silver:
      partition: /machine/silver
      cpu_shares: 333
      cpu_weight: 333
      default_iothreads: 0
    bronze:
      partition: /machine/bronze
      cpu_shares: 167
      cpu_weight: 167
      default_iothreads: 0
