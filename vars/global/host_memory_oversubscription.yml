---
host_memory_oversubscription:
  enabled: true
  verify_state: true
  zram:
    enabled: true
    device_name: zram0
    size: 16G
    compression_algorithm: zstd
    swap_priority: 100
  transparent_hugepages:
    enabled: true
    mode: madvise
    defrag_mode: madvise
  ksm:
    enabled: true
    run: 1
    pages_to_scan: 1000
    sleep_millisecs: 20
  rollback_state:
    transparent_hugepages:
      mode: always
      defrag_mode: always
    ksm:
      run: 0
      pages_to_scan: 100
      sleep_millisecs: 20
