---
openshift_install_artifacts:
  output_dir: "{{ stakkr_execution_ocp_generated_root }}"
  reset_render_dir: true
  pull_secret_file: "{{ stakkr_execution_pull_secret_file }}"
  ssh_public_key_file: "{{ stakkr_execution_ssh_public_key_file }}"
  additional_trust_bundle_file: ""
  install_config:
    metadata_name: "{{ openshift_install_cluster.name }}"
    compute_replicas: >-
      {{
        openshift_install_cluster.nodes
        | rejectattr('role', 'equalto', 'control-plane')
        | list
        | length
      }}
    control_plane_replicas: >-
      {{
        openshift_install_cluster.nodes
        | selectattr('role', 'equalto', 'control-plane')
        | list
        | length
      }}
    network_type: OVNKubernetes
    cluster_network:
      - cidr: 10.128.0.0/14
        host_prefix: 23
    service_network:
      - 172.30.0.0/16
  agent_config:
    rendezvous_ip: >-
      {{
        (
          openshift_install_cluster.nodes
          | selectattr('role', 'equalto', 'control-plane')
          | first
        ).machine_network.ipv4_address
      }}
    primary_interface_name: eth0
    root_device_hints: {}

