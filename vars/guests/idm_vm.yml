---
idm_vm:
  name: rhel-idm
  domain: stakkr.lan
  source_image: /var/lib/libvirt/images/rhel-10.1.qcow2
  source_image_format: qcow2
  disk_path: /var/lib/libvirt/images/idm-01.qcow2
  disk_format: qcow2
  osinfo: rhel10.1
  provisioning:
    rebuild_disk_from_image: false
    recreate_domain: false
  boot:
    firmware: uefi
    machine: q35
    cpu_model: host-passthrough
    tpm_enabled: false
  resources:
    memory_mb: 8192
    vcpus: 2
  performance_domain:
    tier: silver
    iothreads: 0
  network:
    attachment_type: bridge
    bridge_name: bridge0
    libvirt_network: ""
    libvirt_portgroup: ""
    model: virtio
    interface_name: eth0
    mac_address: "52:54:00:50:01:02"
    ipv4_address: 192.168.1.229
    prefix_length: 24
    gateway: 192.168.1.1
    dns_servers:
      - 192.168.1.142
      - 192.168.1.242
  access:
    admin_user: cloud-user
    admin_password: "{{ lab_default_password | default('') }}"
    ssh_private_key_file: >-
      {{ lookup('env', 'HOME') + '/.ssh/id_ed25519' }}
    lock_password: false
    ssh_password_auth: false
    ssh_authorized_keys: >-
      {{
        [lab_operator_ssh_public_key | default('')]
        | reject('equalto', '')
        | list
      }}
  subscription:
    enabled: false
    activation_key: "{{ lab_rhsm.activation_key | default('') }}"
    organization_id: "{{ lab_rhsm.organization_id | default('') }}"
    username: "{{ lab_rhsm.username | default('') }}"
    password: "{{ lab_rhsm.password | default('') }}"
    server_hostname: "{{ lab_rhsm.server_hostname | default('') }}"

idm_local:
  runtime_root: /var/lib/stakkr

idm_server:
  realm: STAKKR.LAN
  ds_password: "{{ lab_default_password | default('') }}"
  admin_password: "{{ lab_default_password | default('') }}"
  setup_dns: true
  dns_forwarders:
    - 192.168.1.142
    - 192.168.1.242
  static_dns_records: []
  trusted_networks:
    - 192.168.1.0/24
  ipa_packages:
    - ipa-server
    - ipa-server-dns
    - ipa-server-trust-ad
    - idm-pki-kra
  cockpit:
    packages:
      - cockpit
      - cockpit-files
      - cockpit-ostree
      - cockpit-packagekit
      - cockpit-podman
      - cockpit-session-recording
      - cockpit-storaged
      - cockpit-system
      - cockpit-ws-selinux
  session_recording:
    packages:
      - tlog
    scope: all
    users: []
    groups: []
    exclude_users: []
    exclude_groups: []
  firewall_services:
    - cockpit
    - dns
    - freeipa-4
    - freeipa-trust
  identity_groups:
    - admins
    - openshift-admin
    - virt-admin
    - developer
  password_policy:
    enabled: true
    maxlife_days: 3650
    minlife_hours: 0
    history_length: 0
    minclasses: 0
    minlength: 8
    priority_start: 40
    priority_step: 10
  identity_users:
    - name: sysop
      first_name: Sysop
      last_name: User
      shell: /bin/bash
      password: "{{ lab_default_password | default('') }}"
      groups:
        - admins
        - openshift-admin
    - name: virtadm
      first_name: Virt
      last_name: Admin
      shell: /bin/bash
      password: "{{ lab_default_password | default('') }}"
      groups:
        - virt-admin
    - name: dev
      first_name: Dev
      last_name: User
      shell: /bin/bash
      password: "{{ lab_default_password | default('') }}"
      groups:
        - developer
  sudo_policy:
    enabled: true
    rule_name: admins-nopasswd-all
    description: >-
      Permit admins group members to run any command on any host without
      authentication
    group: admins
